name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 GitHub CLI (gh)
        run: sudo apt-get update && sudo apt-get install -y gh

      - name: 创建 reports 文件夹
        run: mkdir -p reports

      - name: 生成 JSON 文件
        run: python main.py

      - name: 删除旧的 Release
        run: |
          gh release delete latest-stock-report -y 2>/dev/null || true
          git push origin --delete latest-stock-report 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 JSON 到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-stock-report
          name: 📊 最新股票分析报告
          body: 自动生成的股票数据 JSON
          files: reports/stock_analysis_latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
