name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt || true

      - run: sudo apt-get update && sudo apt-get install -y jq

      - run: mkdir -p data logs reports

      - name: 执行分析并生成 JSON
        env:
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          REPORT_TYPE: ${{ vars.REPORT_TYPE || 'simple' }}
          RUN_MODE: ${{ github.event.inputs.mode || 'full' }}
        run: |
          export TZ=Asia/Shanghai
          python main.py

      - name: 上传到 Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports
          path: reports/
          retention-days: 30

      - name: 删除旧 Release
        run: |
          gh release delete latest-stock-report -y 2>/dev/null || true
          git push origin --delete latest-stock-report 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-stock-report
          name: "📊 最新股票分析报告"
          body: "仅保留最新报告"
          files: reports/*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
