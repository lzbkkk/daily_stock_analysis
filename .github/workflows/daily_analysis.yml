name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: mkdir -p reports

      - name: 生成 JSON
        run: python main.py

      - name: 上传 JSON 到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-stock-report
          name: "📊 最新股票分析报告"
          body: "股票分析 JSON 数据"
          files: reports/stock_analysis_latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
