name: 每日股票分析

on:
  schedule:
    - cron: '0 1 * * 1-5'   # UTC 1:00 = 北京时间 09:00（周一~周五）

  workflow_dispatch:        # 手动触发保留
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only

permissions:
  contents: read

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))

      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: 创建目录
        run: mkdir -p data logs reports

      - name: 执行分析
        env:
          TZ: Asia/Shanghai
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          STOCK_LIST: ${{ vars.STOCK_LIST || '600519' }}
          REPORT_TYPE: ${{ vars.REPORT_TYPE || 'simple' }}
          REALTIME_SOURCE_PRIORITY: 'tencent,akshare_sina,efinance'

        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          echo "当前模式: $MODE"
          echo "当前时间: $(date)"

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review
          else
            python main.py
          fi

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-${{ github.run_id }}
          path: |
            reports/
            logs/
          retention-days: 30
