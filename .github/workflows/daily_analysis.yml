name: 每日股票分析

on:
  schedule:
    - cron: '0 1 * * 1-5'   # UTC 1:00 = 北京时间 9:00（周一至周五）
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only

permissions:
  contents: read

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    steps:
      - name: 随机延迟（防风控）
        run: sleep $((RANDOM % 60))  # 0-60秒随机延迟，避免固定时间访问

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs reports

      - name: 执行股票分析
        env:
          TZ: Asia/Shanghai  # 统一时区为北京时间
          # AI配置
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          # 数据源
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          # 通知渠道
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          # 自选股配置
          STOCK_LIST: ${{ vars.STOCK_LIST || '600519' }}
          # 运行配置
          REPORT_TYPE: ${{ vars.REPORT_TYPE || 'simple' }}
          REALTIME_SOURCE_PRIORITY: 'tencent,akshare_sina,efinance'

        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          echo "=========================================="
          echo "🚀 A股自选股智能分析系统"
          echo "=========================================="
          echo "⏰ 北京时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 运行模式: $MODE"
          echo "📊 自选股: $STOCK_LIST"
          
          # 执行主程序
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review
          else
            python main.py
          fi

      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 显示运行结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 分析完成"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "生成的报告:"
            ls -la reports/
          else
            echo "⚠️ 未生成报告文件"
          fi
          echo ""
          tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "无日志文件"
